logLevel: info

rtmpAddress: :1935
hlsAddress: :8888
hlsAllowOrigins:
  - "*"
hlsAlwaysRemux: true
hlsVariant: lowLatency
hlsSegmentCount: 6
hlsSegmentDuration: 2s
hlsPartDuration: 500ms
hlsMuxerCloseAfter: 30s
hlsDirectory: /var/lib/mediamtx/hls

paths:
  live/stream:
    source: publisher
    publishUser: obs
    publishPass: change-me-now
