services:
  mediamtx:
    image: bluenviron/mediamtx:latest
    container_name: obs-preview-mediamtx
    restart: unless-stopped
    command: ["/mediamtx", "/mediamtx.yml"]
    env_file:
      - ./.env.mediamtx
    ports:
      - "1935:1935"
      - "127.0.0.1:8888:8888"
    volumes:
      - ./mediamtx.yml:/mediamtx.yml:ro
      - mediamtx-data:/var/lib/mediamtx

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: obs-preview-web
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      NEXT_PUBLIC_HLS_URL: /hls/live/stream/index.m3u8
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - mediamtx

volumes:
  mediamtx-data:
